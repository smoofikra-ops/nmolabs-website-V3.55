    <script>
      // Workaround for libraries that try to overwrite fetch API globals
      ['fetch', 'Headers', 'Request', 'Response'].forEach((name) => {
        let val = window[name];
        if (val) {
          try {
            Object.defineProperty(window, name, {
              enumerable: true,
              configurable: true,
              get: () => val,
              set: (newVal) => { val = newVal; }
            });
          } catch (e) {}
        }
      });
    </script>
